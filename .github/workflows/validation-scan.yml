name: Validation Scan

on:
  workflow_dispatch:

jobs:
  validation-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Regression Tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_security_regression.py

      - name: Setup output directory
        run: mkdir -p resultados/scan-after

      - name: Run bandit
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r . -f json -o resultados/scan-after/bandit-results.json || true
          if [ ! -f resultados/scan-after/bandit-results.json ] || [ ! -s resultados/scan-after/bandit-results.json ]; then
            echo '{"results": []}' > resultados/scan-after/bandit-results.json
          fi

      - name: Run semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep --config=auto --json --output=resultados/scan-after/semgrep-results.json . || true
          if [ ! -f resultados/scan-after/semgrep-results.json ] || [ ! -s resultados/scan-after/semgrep-results.json ]; then
            echo '{"results": []}' > resultados/scan-after/semgrep-results.json
          fi

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --format=json --output=resultados/scan-after/pip-audit-results.json || true
          if [ ! -f resultados/scan-after/pip-audit-results.json ] || [ ! -s resultados/scan-after/pip-audit-results.json ]; then
            echo '{"dependencies": []}' > resultados/scan-after/pip-audit-results.json
          fi

      - name: Run gitleaks
        continue-on-error: true
        run: |
          curl -sSL https://github.com/zricethezav/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --report-format json --report-path resultados/scan-after/gitleaks-results.json --no-git || true
          if [ ! -f resultados/scan-after/gitleaks-results.json ] || [ ! -s resultados/scan-after/gitleaks-results.json ]; then
            echo '[]' > resultados/scan-after/gitleaks-results.json
          fi

      - name: Compare Results and Explain Mitigations
        run: |
          python3 .github/scripts/compare_scans.py

      - name: End report details
        run: cat resultados/scan-after/mitigation-explanation.md

      - name: Commit and push results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados/scan-after/
          if ! git diff --cached --quiet; then
            git commit -m "chore: add validation scan results and mitigation report [skip ci]"
            git push
          fi
